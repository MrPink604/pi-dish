<!DOCTYPE html>
<html>
<head>
  <title>Stream Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
    .log { margin: 5px 0; padding: 5px; border-left: 3px solid #0f0; padding-left: 10px; }
    .error { color: #f00; border-color: #f00; }
    .event { color: #0ff; border-color: #0ff; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    #log { max-height: 80vh; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>Streaming Test</h1>
  <div>
    <button onclick="connect()">Connect</button>
    <button onclick="sendTest()">Send Test</button>
    <button onclick="clearLog()">Clear</button>
  </div>
  <div id="log"></div>

  <script>
    const sessionId = '456b29b6-9915-4406-bfd8-d2c873fb5e39';
    let evtSource = null;
    const logEl = document.getElementById('log');

    function add(msg, type = 'log') {
      const div = document.createElement('div');
      div.className = `log ${type}`;
      div.textContent = new Date().toLocaleTimeString() + ' ' + msg;
      logEl.appendChild(div);
      console.log(msg);
    }

    function connect() {
      if (evtSource) {
        evtSource.close();
        add('Closed existing', 'log');
      }

      add('Connecting...');
      evtSource = new EventSource(`/api/sessions/${sessionId}/stream`);

      evtSource.onopen = () => add('Connected!', 'event');
      
      evtSource.onmessage = (e) => {
        add(`MSG: ${e.data.slice(0, 100)}`, 'log');
      };

      evtSource.addEventListener('thinking', (e) => {
        add(`🤔 THINKING: ${e.data.slice(0, 80)}...`, 'event');
      });

      evtSource.addEventListener('tool_call', (e) => {
        add(`🔧 TOOL_CALL: ${e.data.slice(0, 80)}...`, 'event');
      });

      evtSource.addEventListener('tool_result', (e) => {
        add(`✅ TOOL_RESULT: ${e.data.slice(0, 80)}...`, 'event');
      });

      evtSource.addEventListener('turn_end', (e) => {
        add(`✓ TURN_END: ${e.data.slice(0, 80)}...`, 'event');
      });

      evtSource.onerror = (e) => {
        add(`ERROR: readyState=${evtSource.readyState}`, 'error');
      };
    }

    async function sendTest() {
      add('Sending message...');
      try {
        const res = await fetch(`/api/sessions/${sessionId}/prompt`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            message: 'List the files in the current directory', 
            mode: 'steer' 
          })
        });
        const data = await res.json();
        add(`Send result: ${JSON.stringify(data)}`, 'log');
      } catch (err) {
        add(`Send failed: ${err.message}`, 'error');
      }
    }

    function clearLog() {
      logEl.innerHTML = '';
    }

    add('Page loaded. Click Connect to start.');
  </script>
</body>
</html>
