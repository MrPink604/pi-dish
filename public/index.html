<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi-dish</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23073642'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%23268bd2' font-family='Georgia,serif'%3E%CF%80%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <!-- Vendored (see scripts/build-vendor.js) — no CDN so the UI works on
       LAN-only clients and markdown rendering never silently degrades. -->
  <link rel="stylesheet" href="vendor/hljs-theme.min.css">
  <link rel="stylesheet" href="vendor/xterm.css">
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.js"></script>
  <!-- Terminal (feature-flagged; see /api/config). deferred — only used
       after DOMContentLoaded, no need to block first paint on 480KB. -->
  <script src="vendor/xterm.js" defer></script>
  <script src="vendor/xterm-addon-fit.js" defer></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>π-dish</h1>
        <button class="btn-icon" onclick="refreshSessions()" title="Refresh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-2.636-6.364"/>
            <path d="M21 3v6h-6"/>
          </svg>
        </button>
      </div>
      
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tabActive" onclick="switchTab('active')">Active <span class="tab-count" id="countActive"></span></button>
        <button class="sidebar-tab" id="tabAll" onclick="switchTab('all')">All</button>
      </div>
      
      <div class="sidebar-filter">
        <input type="text" class="filter-input" id="filterInput" placeholder="Filter sessions..." oninput="onFilterInput()">
      </div>
      
      <div class="session-list" id="sessionList">
        <!-- Sessions will be rendered here -->
      </div>
      
      <div class="sidebar-footer">
        <div class="new-session-cwd">
          <label class="cwd-label" for="newSessionCwd">cwd</label>
          <div class="cwd-input-wrap">
            <input type="text" id="newSessionCwd" class="cwd-input" placeholder="~" spellcheck="false" autocomplete="off">
            <div class="cwd-dropdown" id="cwdDropdown"></div>
          </div>
        </div>
        <button class="btn" onclick="createSession()">+ New Session</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="empty-state" id="emptyState">
        <button class="menu-btn empty-menu-btn" onclick="toggleSidebar()" aria-label="Open session list">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <div class="empty-icon">π</div>
        <p>Select a session from the sidebar</p>
      </div>
      
      <div class="session-view" id="sessionView" style="display: none;">
        <!-- Session Header -->
        <header class="session-header">
          <button class="menu-btn header-menu-btn" onclick="toggleSidebar()" aria-label="Open session list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
          </button>
          <div class="session-info">
            <h2 id="sessionName" class="editable-name" onclick="startRename()" title="Click to rename">Session Name</h2>
            <input type="text" id="sessionNameInput" class="name-input" style="display:none"
              onblur="commitRename()" onkeydown="handleRenameKey(event)">
            <div class="session-meta session-meta-desktop">
              <div class="model-selector" id="modelSelector">
                <button class="badge badge-model" id="sessionModel" onclick="toggleModelDropdown()" title="Change model">model ▾</button>
              </div>
              <button class="badge badge-thinking" id="sessionThinking" onclick="toggleThinkingDropdown(event)" title="Thinking level" style="display:none">🧠 ▾</button>
              <button class="badge badge-context" id="sessionContext" onclick="openStatsModal()" title="Session stats">0%</button>
              <span class="badge" id="sessionMsgCount">0 msgs</span>
              <span class="badge badge-working" id="sessionWorking"><span class="spinner-dot"></span><span class="spinner-text">Working</span></span>
            </div>
          </div>
          <div class="session-actions">
            <button class="btn-icon" id="btnSearch" onclick="toggleSearchBar()" title="Search in session (Ctrl+F)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="7"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
            </button>
            <button class="btn-icon" id="btnTerminal" onclick="toggleTerminal()" title="Terminal at session cwd" style="display:none">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="16" rx="2"/>
                <path d="M7 9l3 3-3 3M13 15h4"/>
              </svg>
            </button>
            <button class="btn-icon" id="btnFocus" onclick="toggleFocusMode()" title="Focus mode: hide tool calls/results">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 6h16M7 12h10M10 18h4"/>
              </svg>
            </button>
            <button class="btn-icon" id="btnTree" onclick="openTreeModal()" title="Session tree">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="6" cy="5" r="2"/><circle cx="6" cy="19" r="2"/><circle cx="18" cy="12" r="2"/>
                <path d="M6 7v10M6 12h10"/>
              </svg>
            </button>
            <button class="btn-icon" id="btnExport" onclick="exportSession()" title="Export session as HTML">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <path d="M7 10l5 5 5-5"/>
                <path d="M12 15V3"/>
              </svg>
            </button>
          </div>
        </header>

        <!-- In-session search (toggle: 🔍 button or Ctrl+F) -->
        <div class="search-bar" id="searchBar" style="display:none">
          <input type="text" class="search-input" id="searchInput" placeholder="Search in session… (Enter = previous match, Shift+Enter = next)"
            onkeydown="handleSearchKey(event)" spellcheck="false" autocomplete="off">
          <span class="search-count" id="searchCount"></span>
          <button class="btn-icon" onclick="searchPrev()" title="Previous match (Enter)">↑</button>
          <button class="btn-icon" onclick="searchNext()" title="Next match (Shift+Enter)">↓</button>
          <button class="btn-icon" onclick="closeSearch()" title="Close (Esc)">✕</button>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages">
          <!-- Messages will be rendered here -->
        </div>
        
        <!-- Terminal panel (feature-flagged: PI_DISH_TERMINAL=1 on the server).
             A shell at the session's cwd; the PTY lives server-side and
             survives socket drops, so closing/reopening reattaches. -->
        <div class="terminal-panel" id="terminalPanel" style="display:none">
          <div class="terminal-resize-handle" id="terminalResizeHandle" title="Drag to resize"></div>
          <div class="terminal-header">
            <span class="terminal-title">&gt;_</span>
            <span class="terminal-cwd" id="terminalCwd"></span>
            <span class="terminal-status" id="terminalStatus"></span>
            <button class="btn-icon" id="termRestartBtn" onclick="restartTerminalShell()" title="Restart shell (kills anything running in it)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12a9 9 0 11-2.636-6.364"/>
                <path d="M21 3v6h-6"/>
              </svg>
            </button>
            <button class="btn-icon" id="termCloseBtn" onclick="closeTerminal()" title="Close terminal (shell keeps running)">✕</button>
          </div>
          <div class="terminal-container" id="terminalContainer"></div>
          <!-- Soft keyboards can't type these; shown on touch layouts only.
               pointerdown is prevented so taps don't blur the terminal
               (a blur closes the phone keyboard). -->
          <div class="terminal-keybar" id="terminalKeybar">
            <button data-termkey="esc">esc</button>
            <button data-termkey="tab">tab</button>
            <button data-termkey="ctrl" id="termKeyCtrl">ctrl</button>
            <button data-termkey="up">↑</button>
            <button data-termkey="down">↓</button>
            <button data-termkey="left">←</button>
            <button data-termkey="right">→</button>
            <button data-termkey="ctrl-c">^C</button>
          </div>
        </div>

        <!-- Resume bar (for inactive/previous sessions) -->
        <div class="resume-bar" id="resumeBar" style="display:none">
          <div class="resume-info">
            <span class="resume-label">Read-only — session is inactive</span>
            <span class="resume-cwd">~</span>
          </div>
          <button class="btn btn-primary" onclick="resumeSession()">Resume</button>
        </div>

        <!-- Input (for active sessions) -->
        <div class="input-area">
          <!-- Mobile control panel (opened via ⚙ in the actions row).
               Model + context live in the header on mobile now. -->
          <div class="control-panel" id="controlPanel">
            <button class="cp-row" id="cpThinkingRow" onclick="toggleThinkingDropdown(event)" title="Thinking level" style="display:none">
              <span class="cp-label">Thinking</span>
              <span class="cp-value" id="sessionThinkingMobile">—</span>
            </button>
            <button class="cp-row" onclick="closeControlPanel(); openSearch()" title="Search in session">
              <span class="cp-label">Search in session</span>
              <span class="cp-value">🔍</span>
            </button>
            <button class="cp-row" id="cpTerminalRow" onclick="closeControlPanel(); toggleTerminal()" title="Terminal at session cwd" style="display:none">
              <span class="cp-label">Terminal</span>
              <span class="cp-value">&gt;_</span>
            </button>
            <button class="cp-row" id="btnFocusMobile" onclick="toggleFocusMode()" title="Hide tool calls/results">
              <span class="cp-label">Focus mode</span>
              <span class="cp-value" id="focusModeState">off</span>
            </button>
            <button class="cp-row" onclick="closeControlPanel(); openTreeModal()" title="Session tree">
              <span class="cp-label">Session tree</span>
              <span class="cp-value">⑂</span>
            </button>
            <button class="cp-row" onclick="closeControlPanel(); exportSession()" title="Export session as HTML">
              <span class="cp-label">Export HTML</span>
              <span class="cp-value">↓</span>
            </button>
          </div>
          <div class="queue-status" id="queueStatus" style="display:none"></div>
          <div class="queue-panel" id="queuePanel" style="display:none"></div>
          <div class="attachment-strip" id="attachmentStrip" style="display:none"></div>
          <textarea id="promptInput" placeholder="Send a message..." rows="2"></textarea>
          <input type="file" id="imageFileInput" accept="image/*" multiple style="display:none">
          <div class="input-actions">
            <button class="badge badge-tool-btn" id="btnAttach" onclick="document.getElementById('imageFileInput').click()" title="Attach images">📎</button>
            <button class="badge badge-context" id="sessionContextBar" onclick="openStatsModal()" title="Session stats">0%</button>
            <span class="status" id="status"></span>
            <span class="badge badge-working" id="sessionWorkingMobile"><span class="spinner-dot"></span><span class="spinner-text"></span></span>
            <button class="badge badge-tool-btn mobile-only" id="btnPanel" onclick="toggleControlPanel()" title="Session controls">⚙</button>
            <button class="btn btn-stop" id="btnStop" onclick="abortTurn()" style="display:none" title="Stop (Esc)">Stop</button>
            <button class="btn btn-steer" id="btnSteer" onclick="sendSteer()" style="display:none" title="Steer (Ctrl+Enter)">Steer</button>
            <button class="btn btn-steer" id="btnFollowUp" onclick="sendFollowUp()" style="display:none" title="Queue after agent finishes">Follow-up</button>
            <button class="btn btn-primary" id="btnSend" onclick="sendPrompt()">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Tree Modal -->
  <div class="modal-overlay" id="treeModal" style="display:none" onclick="if(event.target===this)closeTreeModal()">
    <div class="modal tree-modal">
      <div class="modal-header">
        <h3>Session Tree</h3>
        <div class="tree-controls">
          <input type="text" class="tree-search" id="treeSearch" placeholder="Search..." oninput="filterTree(this.value)">
          <select class="tree-filter" id="treeFilter" onchange="filterTree(document.getElementById('treeSearch').value)">
            <option value="default">Default</option>
            <option value="no-tools">No Tools</option>
            <option value="user-only">User Only</option>
            <option value="all">All</option>
          </select>
          <button class="btn-icon" onclick="closeTreeModal()" title="Close (Esc)">✕</button>
        </div>
      </div>
      <div class="tree-body" id="treeBody">
        <!-- Tree nodes rendered here -->
      </div>
      <div class="modal-footer">
        <div class="tree-status" id="treeStatus"></div>
        <span class="tree-hint">Click a node to branch from that point</span>
      </div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div class="modal-overlay" id="statsModal" style="display:none" onclick="if(event.target===this)closeStatsModal()">
    <div class="modal stats-modal">
      <div class="modal-header">
        <h3>Session Stats</h3>
        <button class="btn-icon" onclick="closeStatsModal()" title="Close (Esc)">✕</button>
      </div>
      <div class="stats-body" id="statsBody">Loading...</div>
    </div>
  </div>

  <script src="helpers.js"></script>
  <script src="app.js"></script>
  <div class="model-dropdown" id="modelDropdown"></div>
  <div class="thinking-dropdown" id="thinkingDropdown" style="display:none"></div>
</body>
</html>
