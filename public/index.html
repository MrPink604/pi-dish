<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi-dish</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>
    
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>π-dish</h1>
        <button class="btn-icon" onclick="refreshSessions()" title="Refresh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-2.636-6.364"/>
            <path d="M21 3v6h-6"/>
          </svg>
        </button>
      </div>
      
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tabActive" onclick="switchTab('active')">Active</button>
        <button class="sidebar-tab" id="tabBrowse" onclick="switchTab('browse')">Browse</button>
      </div>
      
      <div class="sidebar-filter">
        <input type="text" class="filter-input" id="filterInput" placeholder="Filter sessions..." oninput="onFilterInput()">
      </div>
      
      <div class="session-list" id="sessionList">
        <!-- Sessions will be rendered here -->
      </div>
      
      <div class="sidebar-footer">
        <button class="btn" onclick="createSession()">+ New Session</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">π</div>
        <p>Select a session from the sidebar</p>
      </div>
      
      <div class="session-view" id="sessionView" style="display: none;">
        <!-- Session Header -->
        <header class="session-header">
          <div class="session-info">
            <h2 id="sessionName" class="editable-name" onclick="startRename()" title="Click to rename">Session Name</h2>
            <input type="text" id="sessionNameInput" class="name-input" style="display:none"
              onblur="commitRename()" onkeydown="handleRenameKey(event)">
            <div class="session-meta session-meta-desktop">
              <div class="model-selector" id="modelSelector">
                <button class="badge badge-model" id="sessionModel" onclick="toggleModelDropdown()" title="Change model">model ▾</button>
                <div class="model-dropdown" id="modelDropdown"></div>
              </div>
              <span class="badge badge-context" id="sessionContext">0%</span>
              <span class="badge" id="sessionMsgCount">0 msgs</span>
            </div>
          </div>
          <div class="session-actions">
          </div>
        </header>
        
        <!-- Messages -->
        <div class="messages" id="messages">
          <!-- Messages will be rendered here -->
        </div>
        
        <!-- Resume bar (for inactive/previous sessions) -->
        <div class="resume-bar" id="resumeBar" style="display:none">
          <div class="resume-info">
            <span class="resume-label">Read-only — session is inactive</span>
            <span class="resume-cwd">~</span>
          </div>
          <button class="btn btn-primary" onclick="resumeSession()">Resume</button>
        </div>

        <!-- Input (for active sessions) -->
        <div class="input-area">
          <textarea id="promptInput" placeholder="Send a message..." rows="2"></textarea>
          <div class="input-actions">
            <span class="status" id="status"></span>
            <!-- Mobile-only: model/context in the actions row -->
            <div class="input-meta" id="inputMeta">
              <div class="model-selector model-selector-mobile" id="modelSelectorMobile">
                <button class="badge badge-model" id="sessionModelMobile" onclick="toggleModelDropdown()" title="Change model">model ▾</button>
              </div>
              <span class="badge badge-context" id="sessionContextMobile">0%</span>
            </div>
            <button class="btn btn-stop" id="btnStop" onclick="abortTurn()" style="display:none" title="Stop (Esc)">Stop</button>
            <button class="btn btn-primary" id="btnSend" onclick="sendPrompt()">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Tree Modal -->
  <div class="modal-overlay" id="treeModal" style="display:none" onclick="if(event.target===this)closeTreeModal()">
    <div class="modal tree-modal">
      <div class="modal-header">
        <h3>Session Tree</h3>
        <div class="tree-controls">
          <input type="text" class="tree-search" id="treeSearch" placeholder="Search..." oninput="filterTree(this.value)">
          <select class="tree-filter" id="treeFilter" onchange="filterTree(document.getElementById('treeSearch').value)">
            <option value="default">Default</option>
            <option value="no-tools">No Tools</option>
            <option value="user-only">User Only</option>
            <option value="all">All</option>
          </select>
          <button class="btn-icon" onclick="closeTreeModal()" title="Close (Esc)">✕</button>
        </div>
      </div>
      <div class="tree-body" id="treeBody">
        <!-- Tree nodes rendered here -->
      </div>
      <div class="modal-footer">
        <span class="tree-status" id="treeStatus"></span>
        <span class="tree-hint">Click a node to branch from that point</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
